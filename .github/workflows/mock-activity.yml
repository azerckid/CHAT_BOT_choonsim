name: Mock Users - Activity

on:
  schedule:
    - cron: '0 * * * *'  # 매시간 정각 (UTC)
  workflow_dispatch:

jobs:
  activity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call mock-activity
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/mock-activity")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Cron failed with status $STATUS"
            exit 1
          fi
